name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # manual trigger for smoke-testing without publishing

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # Build all 6 platform targets
  # -----------------------------------------------------------------------
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact: install-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact: install-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            artifact: install-macos-amd64
          - goos: darwin
            goarch: arm64
            artifact: install-macos-arm64
          - goos: linux
            goarch: amd64
            artifact: install-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: install-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          go build
          -ldflags "-X main.version=${{ github.ref_name }}"
          -o ${{ matrix.artifact }}
          ./cmd/deft-install/
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # -----------------------------------------------------------------------
  # Create macOS universal binary from the two darwin builds
  # -----------------------------------------------------------------------
  universal-macos:
    needs: build
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: install-macos-amd64
      - uses: actions/download-artifact@v4
        with:
          name: install-macos-arm64
      - name: Create universal binary
        run: lipo -create -output install-macos-universal install-macos-amd64 install-macos-arm64
      - name: Verify universal binary
        run: lipo -info install-macos-universal
      - uses: actions/upload-artifact@v4
        with:
          name: install-macos-universal
          path: install-macos-universal

  # -----------------------------------------------------------------------
  # Smoke test — run --version on each native-runnable binary
  # -----------------------------------------------------------------------
  smoke-test:
    needs: [build, universal-macos]
    strategy:
      matrix:
        include:
          - artifact: install-windows-amd64.exe
            runner: windows-latest
            expected_os: windows
            expected_arch: amd64
          - artifact: install-linux-amd64
            runner: ubuntu-latest
            expected_os: linux
            expected_arch: amd64
          - artifact: install-linux-arm64
            runner: ubuntu-24.04-arm
            expected_os: linux
            expected_arch: arm64
          - artifact: install-macos-universal
            runner: macos-latest
            expected_os: darwin
            expected_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.artifact }}
      - name: Smoke test --version
        run: ./${{ matrix.artifact }} --version
      - name: Verify --help output
        shell: bash
        run: |
          ./${{ matrix.artifact }} --help > help_output.txt 2>&1 || true
          grep -q "Usage:" help_output.txt
          grep -q "branch" help_output.txt
      - name: Verify platform detection
        shell: bash
        run: |
          echo "" | ./${{ matrix.artifact }} --debug > debug_output.txt 2>&1 || true
          grep -q "OS=${{ matrix.expected_os }}" debug_output.txt
          grep -q "ARCH=${{ matrix.expected_arch }}" debug_output.txt
      - name: Verify wizard starts
        shell: bash
        run: |
          echo "" | ./${{ matrix.artifact }} > wizard_output.txt 2>&1 || true
          grep -q "Welcome to Deft" wizard_output.txt
      - name: Verify --branch flag accepted
        shell: bash
        run: |
          echo "" | ./${{ matrix.artifact }} --branch beta > branch_output.txt 2>&1 || true
          grep -q "Welcome to Deft" branch_output.txt
      - name: Verify macOS universal architectures
        if: matrix.artifact == 'install-macos-universal'
        run: lipo -info install-macos-universal | grep -q "x86_64 arm64"

  # -----------------------------------------------------------------------
  # Create GitHub Release and attach the five final binaries
  # -----------------------------------------------------------------------
  release:
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/install-windows-amd64.exe
            artifacts/install-windows-arm64.exe
            artifacts/install-macos-universal
            artifacts/install-linux-amd64
            artifacts/install-linux-arm64
