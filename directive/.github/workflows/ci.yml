name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  python:
    name: Python (lint + type-check + test)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy type-check (tests/)
        run: uv run mypy tests/

      - name: Pytest with coverage
        run: uv run pytest tests/ --cov --cov-report=term-missing

  go:
    name: Go (test + build)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./cmd/deft-install/

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o /dev/null ./cmd/deft-install/

      - name: Build darwin/arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -o /dev/null ./cmd/deft-install/

      - name: Build windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o /dev/null ./cmd/deft-install/
